name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version: '1.22'
    
    - name: Build CLI
      working-directory: ./apps/prow-analyzer
      run: go build -v ./cmd/prow-analyzer--cli

    - name: Build Bot
      working-directory: ./apps/prow-analyzer
      run: go build -v ./cmd/prow-analyzer--bot

    - name: Test with Coverage
      working-directory: ./apps/prow-analyzer
      run: |
        go test -v -race -coverprofile=coverage.out -covermode=atomic ./pkg/...
        go tool cover -func=coverage.out

    - name: Check Coverage Threshold
      working-directory: ./apps/prow-analyzer
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep 'total:' | awk '{print $3}' | sed 's/%//')
        THRESHOLD=100.0
        if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
          echo "❌ Coverage $COVERAGE% below threshold $THRESHOLD%"
          exit 1
        fi
        echo "✅ Coverage $COVERAGE% meets threshold $THRESHOLD%"
