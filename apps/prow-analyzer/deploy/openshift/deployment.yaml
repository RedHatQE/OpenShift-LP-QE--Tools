apiVersion: v1
kind: Namespace
metadata:
  name: prow-analyzer
---
apiVersion: v1
kind: Secret
metadata:
  name: prow-analyzer-secrets
  namespace: prow-analyzer
type: Opaque
stringData:
  ship-help-token: "YOUR_SHIP_HELP_TOKEN_HERE"
  slack-bot-token: "YOUR_SLACK_BOT_TOKEN_HERE"
  slack-app-token: "YOUR_SLACK_APP_TOKEN_HERE"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prow-analyzer-config
  namespace: prow-analyzer
data:
  monitored-channels: "C12345678,C87654321"  # Replace with actual channel IDs
  mcp-url: "https://ship-help-mcp-continuous-release-tooling--ship-help-bot.apps.gpc.ocp-hub.prod.psi.redhat.com/personas/ocp_ai_helpdesk/mcp"
  prompt-template: "Analyze this Prow CI failure in detail. Provide: (1) Root cause, (2) Related Jira issues, (3) Recurring pattern analysis, (4) Recommended actions. URL: {job_url}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prow-analyzer-bot
  namespace: prow-analyzer
  labels:
    app: prow-analyzer-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prow-analyzer-bot
  template:
    metadata:
      labels:
        app: prow-analyzer-bot
    spec:
      containers:
      - name: bot
        image: quay.io/oramraz/prow-analyzer-bot:v1.0.0
        command: ["/usr/bin/prow-analyzer-bot"]
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: SHIP_HELP_MCP_URL
          valueFrom:
            configMapKeyRef:
              name: prow-analyzer-config
              key: mcp-url
        - name: SHIP_HELP_MCP_TOKEN
          valueFrom:
            secretKeyRef:
              name: prow-analyzer-secrets
              key: ship-help-token
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: prow-analyzer-secrets
              key: slack-bot-token
        - name: SLACK_APP_TOKEN
          valueFrom:
            secretKeyRef:
              name: prow-analyzer-secrets
              key: slack-app-token
        - name: MONITORED_CHANNELS
          valueFrom:
            configMapKeyRef:
              name: prow-analyzer-config
              key: monitored-channels
        - name: PROMPT_TEMPLATE
          valueFrom:
            configMapKeyRef:
              name: prow-analyzer-config
              key: prompt-template
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pgrep prow-analyzer-bot
          initialDelaySeconds: 30
          periodSeconds: 30
